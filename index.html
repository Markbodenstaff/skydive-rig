  .controls input[type=checkbox] { width: 15px; height: 15px; margin: 0; flex-shrink: 0; cursor: pointer; accent-color: #1877f2; }

  .stats { padding: 10px 24px; background: white; border-bottom: 1px solid #e4e6ea; font-size: 13px; color: #65676b; display: flex; gap: 16px; flex-wrap: wrap; }
  .stats span { display: flex; align-items: center; gap: 4px; }
  .stat-num { font-weight: 700; color: #1c1e21; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 14px; padding: 18px 24px; }

  .card { background: white; border-radius: 10px; border: 1px solid #e4e6ea; overflow: hidden; transition: box-shadow 0.18s, transform 0.18s; }

  .b-sold   { background: #ffebee; color: #c62828; }
  .b-d18    { background: #fff3e0; color: #e65100; }
  .b-nl     { background: #e8f5e9; color: #2e7d32; }
  .b-search { background: #e3f2fd; color: #1565c0; }

  .price { font-size: 14px; font-weight: 600; color: #65676b; margin-bottom: 8px; }

  .meta-icon { flex-shrink: 0; }
  .desc { font-size: 12px; color: #65676b; line-height: 1.5; margin-top: 8px; border-top: 1px solid #f0f2f5; padding-top: 8px; }

  .card-footer { padding: 10px 16px; background: #f7f8fa; border-top: 1px solid #f0f2f5; display: flex; justify-content: space-between; align-items: center; }

  }
</style>
</head>

function fbTitleUrl(title) {
  // Strip "(VERKOCHT)" prefix and use key title words for a targeted search
  const clean = title.replace(/^\(VERKOCHT\)\s*/i, '').replace(/\s+-\s+.*$/, '').trim();
  return 'https://www.facebook.com/search/top?q=' + encodeURIComponent(clean);
}
function fbSellerUrl(poster) {
  return 'https://www.facebook.com/search/top?q=' + encodeURIComponent(poster + ' javelin');
}
function isSold(item) { return item.title.toLowerCase().includes('verkocht'); }
function isD18(item) { return /(d|c)[-]?1[78]/i.test(item.title + ' ' + item.description); }
function isNL(item) { return /nederland|, nl\b|, nb\b|, ge\b|, fr\b|tiel|breda|leeuwarden/i.test(item.location); }
function isNew(item) { return !!item.isNew; }
function parsePrice(p) {
  if (!p) return Infinity;
  const n = parseFloat(p.replace(/[^0-9.,]/g,'').replace(',','.'));
  return isNaN(n) ? Infinity : n;
}
function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString('nl-NL', {day:'numeric',month:'short',year:'numeric'}); }
  catch(e) { return iso; }
}

  let items = DATA.results.filter(item => {
    const txt = [item.title, item.description, item.poster, item.location, item.searchTerm].join(' ').toLowerCase();
    if (q && !txt.includes(q)) return false;
    if (status === 'active' && isSold(item)) return false;
    if (status === 'sold' && !isSold(item)) return false;
    if (status === 'new' && !isNew(item)) return false;
    if (d18 && !isD18(item)) return false;
    if (nl && !isNL(item)) return false;
    if (hideSold && isSold(item)) return false;
    return true;
  });

  if (sort === 'price-asc') items.sort((a,b) => parsePrice(a.price) - parsePrice(b.price));
  else if (sort === 'price-desc') items.sort((a,b) => parsePrice(b.price) - parsePrice(a.price));
  else items.sort((a,b) => new Date(b.foundAt) - new Date(a.foundAt));

  const active = items.filter(i => !isSold(i)).length;
  const newCount = items.filter(i => isNew(i)).length;

  document.getElementById('stats').innerHTML =
    `<span>Weergegeven: <span class="stat-num">${items.length}</span></span>` +
    `<span>✅ Beschikbaar: <span class="stat-num">${active}</span></span>` +
    `<span>🔴 Verkocht: <span class="stat-num">${items.length - active}</span></span>` +
    (newCount ? `<span>🆕 Nieuw vandaag: <span class="stat-num">${newCount}</span></span>` : '');

  const grid = document.getElementById('grid');
  if (!items.length) {
    grid.innerHTML = '<div class="no-results">Geen advertenties gevonden voor deze filters.</div>';
    return;
  }

  grid.innerHTML = items.map(item => {
    const sold = isSold(item);
    const d18f = isD18(item);
    const nlf = isNL(item);
    const newf = isNew(item);
    const titleUrl = fbTitleUrl(item.title);
    const sellerUrl = fbSellerUrl(item.poster);

    const classes = ['card', sold ? 'sold' : '', (d18f && !sold) ? 'highlight' : '', newf ? 'is-new' : ''].filter(Boolean).join(' ');

    const imgHtml = item.imageUrl ? `<img class="card-img" src="${item.imageUrl}" alt="${item.title}">` : '';

    return `<div class="${classes}">
      ${imgHtml}
      <div class="card-top">
        <div class="card-title">${item.title}</div>
        <div class="badges">
          ${newf ? '<span class="badge b-new">🆕 NIEUW</span>' : ''}
          ${sold ? '<span class="badge b-sold">Verkocht</span>' : ''}
          ${d18f && !sold ? '<span class="badge b-d18">🎯 D/C-18</span>' : ''}
          ${nlf ? '<span class="badge b-nl">🇳🇱 NL</span>' : ''}
          <span class="badge b-search">${item.searchTerm}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="meta-row"><span class="meta-icon">👤</span><span>${item.poster}</span></div>
        <div class="meta-row"><span class="meta-icon">📍</span><span>${item.location}</span></div>
        <div class="desc">${item.description.slice(0,250)}${item.description.length>250?'…':''}</div>
      </div>
      <div class="card-footer">
        <span><strong style="color:#1c1e21">${item.price}</strong> · ${fmtDate(item.foundAt)}</span>
        <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">
          <a class="fb-link" href="${titleUrl}" target="_blank" title="Zoek de advertentietitel op Facebook">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Advertentie
          </a>
          <a class="fb-link" href="${sellerUrl}" target="_blank" title="Zoek de verkoper op Facebook" style="background:#42b72a">
            👤 Verkoper
          </a>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Init
document.getElementById('lastUpdated').textContent = 'Bijgewerkt: ' + fmtDate(DATA.lastUpdated);
document.getElementById('totalCount').textContent = DATA.results.length + ' advertenties totaal';

// Populate search terms
const terms = [...new Set(DATA.results.map(r => r.searchTerm))].sort();
document.getElementById('termsList').innerHTML = terms.map(t =>
  `<span class="term">🔍 ${t}</span>`
).join('');

render();
</script>
</body>
</html>
